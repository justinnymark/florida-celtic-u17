<script>
  var debugLog = [];
  function logDebug(msg) {
    debugLog.push(msg);
    var el = document.getElementById('debug-overlay');
    if (el) el.textContent = debugLog.join('\n');
  }
  window.onerror = function(msg, url, line, col, error) {
    logDebug('❌ JS ERROR: ' + msg + ' (line ' + line + ':' + col + ')');
    if (error && error.stack) logDebug('STACK: ' + error.stack.slice(0,300));
    return false;
  };
  logDebug('✓ Inline script running');
</script>
<script src="https://cdn.tailwindcss.com" onload="logDebug('✓ Tailwind loaded')" onerror="logDebug('❌ Tailwind FAILED to load')"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" onload="logDebug('✓ React loaded')" onerror="logDebug('❌ React FAILED to load')"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onload="logDebug('✓ ReactDOM loaded')" onerror="logDebug('❌ ReactDOM FAILED to load')"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" onload="logDebug('✓ Babel loaded')" onerror="logDebug('❌ Babel FAILED to load')"></script>
<script>

    logDebug('window.React: ' + (typeof window.React));
    logDebug('window.ReactDOM: ' + (typeof window.ReactDOM));
    logDebug('window.Babel: ' + (typeof window.Babel));
    logDebug('Root element children: ' + document.getElementById('root').children.length);
  }, 2000);
</script>
<script type="text/babel">
try {
logDebug('✓ Babel script block starting to execute');

const { useState, useEffect, useRef } = React;

const SB_URL = "https://fovdszarkfmwyvnhjgth.supabase.co";
const SB_KEY = "sb_publishable_GtZV5uIWe02PMLxdlj36JA_c4l0T3Pt";

const MANAGER_PIN = "0784";

const PAYMENT = {
  venmo:  { handle: "@justin-nymark",        url: "https://venmo.com/u/justin-nymark" },
  paypal: { email:  "justinnymark@gmail.com", url: "https://www.paypal.com/qrcodes/managed/09cb5692-c0e2-4857-acda-40e1b3d1ac7d?payment_type=personal" },
  zelle:  { phone:  "727-295-5333" },
};

const MANAGER = { name:"Justin Nymark", title:"Team Manager", phone:"727-295-5333", email:"justinnymark@gmail.com" };
const COACHES = {
  1: { name:"Jason Montoya", title:"Head Coach", phone:"727-455-9543", email:"jasjmontoya@gmail.com" },
  2: { name:"Austin Lee",    title:"Head Coach", phone:"727-418-0195", email:"austinlee1023@gmail.com" },
};

const sb = async (path, opts={}) => {
  const res = await fetch(`${SB_URL}/rest/v1${path}`, {
    method: opts.method||"GET",
    headers: { apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`, "Content-Type":"application/json", ...(opts.prefer?{Prefer:opts.prefer}:{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status===204 ? null : res.json();
};

const fmt = (n) => `$${Number(n||0).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const fmt2 = (n) => `$${Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const genId = () => `${Date.now()}-${Math.random().toString(36).slice(2,6)}`;

function App() {
  const [teams,        setTeams]        = useState({});
  const [budgets,      setBudgets]      = useState({1:[],2:[]});
  const [rosters,      setRosters]      = useState({1:[],2:[]});
  const [transactions, setTransactions] = useState({1:[],2:[]});
  const [loaded,       setLoaded]       = useState(false);
  const [loadErr,      setLoadErr]      = useState(false);
  const activeTeam = 1;
  const [tab,          setTab]          = useState("dashboard");
  const [mode,         setMode]         = useState("parent");
  const [pinInput,     setPinInput]     = useState("");
  const [showPin,      setShowPin]      = useState(false);
  const [pinError,     setPinError]     = useState(false);
  const [saving,       setSaving]       = useState(false);

  const loadData = async () => {
    try {
      const [teamsData, budgetData, playerData, txData] = await Promise.all([
        sb("/teams?select=*&order=team_number"),
        sb("/budget_items?select=*&order=team_id,category"),
        sb("/players?select=*&order=player_name"),
        sb("/transactions?select=*&order=created_at.asc"),
      ]);
      const tMap = {};
      teamsData.forEach(t => { tMap[t.team_number] = t; });
      setTeams(tMap);
      const bMap={1:[],2:[]};
      budgetData.forEach(b => { const tn=teamsData.find(t=>t.id===b.team_id)?.team_number; if(tn) bMap[tn].push(b); });
      setBudgets(bMap);
      const rMap={1:[],2:[]};
      playerData.forEach(p => { const tn=teamsData.find(t=>t.id===p.team_id)?.team_number; if(tn) rMap[tn].push(p); });
      setRosters(rMap);
      const txMap={1:[],2:[]};
      [1,2].forEach(tn => {
        const tid=teamsData.find(t=>t.team_number===tn)?.id;
        const teamTx=txData.filter(t=>t.team_id===tid);
        let bal=0; teamTx.forEach(tx=>{bal+=(tx.amount_in||0)-(tx.amount_out||0);tx.running_balance=bal;});
        txMap[tn]=[...teamTx].reverse();
      });
      setTransactions(txMap);
      setLoadErr(false);
    } catch(e) { setLoadErr(true); }
    setLoaded(true);
  };

  useEffect(() => { loadData(); }, []);

  const team   = teams[activeTeam]||{};
  const budget = budgets[activeTeam]||[];
  const roster = rosters[activeTeam]||[];
  const txList = transactions[activeTeam]||[];

  const totalBudget     = budget.reduce((s,i)=>s+(Number(i.actual)||Number(i.estimated)||0),0);
  const rawPerPlayer    = team.player_count>0 ? totalBudget/team.player_count : 0;
  const chargePerPlayer = team.player_count>0&&team.round_to>0 ? Math.ceil(rawPerPlayer/team.round_to)*team.round_to : 0;
  const totalCollected  = roster.reduce((s,p)=>s+(Number(p.amount_paid)||0),0);
  const totalOwed       = roster.reduce((s,p)=>s+(Number(p.amount_owed)||0),0);
  const totalOutstanding = totalOwed-totalCollected;
  const fundBalance     = txList.length>0 ? txList[0].running_balance : 0;
  const countPaid       = roster.filter(p=>p.status==="Paid").length;
  const countPartial    = roster.filter(p=>p.status==="Partial").length;
  const countUnpaid     = roster.filter(p=>p.status==="Unpaid").length;

  // Manager actions
  const logPayment = async (playerId, playerName, parentName, amount, method) => {
    setSaving(true);
    try {
      const p = roster.find(r=>r.id===playerId);
      if (!p) return;
      const newPaid = (p.amount_paid||0)+amount;
      const newStatus = newPaid>=p.amount_owed?"Paid":newPaid>0?"Partial":"Unpaid";
      await sb(`/players?id=eq.${playerId}`, {method:"PATCH", body:{amount_paid:newPaid,status:newStatus}});
      await sb("/transactions", {method:"POST", body:{team_id:team.id, player_id:playerId, description:`Payment — ${parentName||playerName}`, amount_in:amount, amount_out:0, method, date:new Date().toISOString().slice(0,10), notes:""}});
      await loadData();
    } catch(e) { alert("Save failed: "+e.message); }
    setSaving(false);
  };

  const tryManagerLogin = () => {
    const entered = pinInput.trim().replace(/\s/g, "");
    if (entered === MANAGER_PIN) { setMode("manager"); setShowPin(false); setPinInput(""); setPinError(false); }
    else { setPinError(true); setPinInput(""); }
  };

  const KPI = ({label,value,sub,accent,warn}) => (
    <div className={`rounded-2xl p-4 ${accent?"bg-green-800 text-white":warn?"bg-amber-50 border border-amber-200":"bg-white border border-green-100"}`}>
      <div className={`text-xs font-semibold uppercase tracking-wide mb-1 ${accent?"text-green-300":warn?"text-amber-600":"text-green-700"}`}>{label}</div>
      <div className={`text-2xl font-bold ${accent?"text-white":warn?"text-amber-800":"text-gray-900"}`}>{value}</div>
      {sub&&<div className={`text-xs mt-0.5 ${accent?"text-green-300":"text-gray-400"}`}>{sub}</div>}
    </div>
  );

  const Badge = ({status}) => {
    const s={Paid:"bg-green-100 text-green-800",Partial:"bg-amber-100 text-amber-800",Unpaid:"bg-red-100 text-red-700"};
    return React.createElement('span',{className:`text-xs font-bold px-2.5 py-0.5 rounded-full ${s[status]||s.Unpaid}`},
      status==="Paid"?"✓ Paid":status==="Partial"?"½ Partial":"✗ Unpaid");
  };

  const DashboardTab = () => (
    <div className="space-y-4">
      <div className="grid grid-cols-2 gap-3">
        <KPI label="Season Budget" value={fmt(totalBudget)} sub={chargePerPlayer>0?`${fmt(chargePerPlayer)}/player`:"Budget pending"} />
        <KPI label="Fund Balance"  value={fmt(fundBalance)} accent />
        <KPI label="Collected"     value={fmt(totalCollected)} sub={`of ${fmt(totalOwed)} owed`} />
        <KPI label="Outstanding"   value={fmt(totalOutstanding)} warn={totalOutstanding>0} sub={`${countUnpaid+countPartial} players`} />
      </div>
      <div className="bg-white border border-green-100 rounded-2xl p-4">
        <div className="flex justify-between items-center mb-3">
          <span className="text-xs font-semibold text-green-800 uppercase tracking-wide">Collection Progress</span>
          <span className="text-xs text-gray-500">{totalOwed>0?Math.round((totalCollected/totalOwed)*100):0}%</span>
        </div>
        <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
          <div className="h-3 bg-gradient-to-r from-green-500 to-green-700 rounded-full" style={{width:`${totalOwed>0?Math.min(100,(totalCollected/totalOwed)*100):0}%`}}/>
        </div>
        <div className="flex justify-between mt-3 text-xs text-gray-500">
          <span>✅ Paid <strong className="text-green-700">{countPaid}</strong></span>
          <span>⚠️ Partial <strong className="text-amber-600">{countPartial}</strong></span>
          <span>❌ Unpaid <strong className="text-red-600">{countUnpaid}</strong></span>
        </div>
      </div>
      {chargePerPlayer>0&&(
        <div className="bg-white border border-green-100 rounded-2xl p-4">
          <div className="text-xs font-semibold text-green-800 uppercase tracking-wide mb-3">Per-Player Fee</div>
          <div className="space-y-1.5 text-sm">
            {[["Total Budget",fmt(totalBudget)],["÷ Players",team.player_count||"—"],["Round up to nearest",`$${team.round_to}`]].map(([k,v])=>(
              <div key={k} className="flex justify-between text-gray-600"><span>{k}</span><span className="font-medium">{v}</span></div>
            ))}
            <div className="flex justify-between border-t border-green-100 pt-2 mt-1">
              <span className="font-bold text-green-800">Your fee</span>
              <span className="font-bold text-green-800 text-xl">{fmt(chargePerPlayer)}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  const GROUP_ORDER = ["Tourney Fees","Ref Fees","Camera Fees","Equipment Fees","Coach Reimbursement","UPSL Fees","Miscellaneous"];
  const [openGroups, setOpenGroups] = React.useState(new Set(["Tourney Fees"]));
  const toggleGroup = (g) => setOpenGroups(prev => { const n=new Set(prev); n.has(g)?n.delete(g):n.add(g); return n; });

  const BudgetTab = () => {
    const groups = GROUP_ORDER.filter(g => budget.some(b => b.category === g));
    const categoryKeywords = {
      "Equipment Fees": ["equipment","ball","pinni"],
      "Ref Fees": ["ref","referee"],
      "Tourney Fees": ["tournament","tourney","showcase","cup","classic"],
      "Coach Reimbursement": ["coach","airfare","hotel","car rental","mileage","food"],
      "Camera Fees": ["veo","camera"],
      "UPSL Fees": ["upsl"],
      "Miscellaneous": ["misc"],
    };
    const getSpent = (g) => {
      const kws = categoryKeywords[g] || [];
      return txList.filter(tx => tx.amount_out > 0 && kws.some(k => (tx.description||"").toLowerCase().includes(k))).reduce((s,tx) => s + (tx.amount_out||0), 0);
    };
    return (
      <div className="space-y-2">
        {budget.length===0&&<div className="bg-white border border-green-100 rounded-2xl p-8 text-center text-gray-400 text-sm">Budget coming soon.</div>}
        {groups.map(g => {
          const items = budget.filter(b => b.category === g);
          const groupTotal = items.reduce((s,b) => s + (Number(b.actual)||Number(b.estimated)||0), 0);
          const spent = getSpent(g);
          const pct = groupTotal > 0 ? Math.min(100, (spent / groupTotal) * 100) : 0;
          const isOpen = openGroups.has(g);
          return (
            <div key={g} className="bg-white border border-green-100 rounded-2xl overflow-hidden">
              <button onClick={()=>toggleGroup(g)} className="w-full flex justify-between items-center px-4 py-3 bg-green-800 text-white">
                <div className="flex items-center gap-2">
                  <span className="text-sm font-bold">{isOpen?"▾":"▸"}</span>
                  <span className="text-sm font-bold">{g}</span>
                </div>
                <span className={`text-sm font-bold ${groupTotal<0?"text-red-300":"text-white"}`}>{groupTotal<0?`-${fmt(Math.abs(groupTotal))}`:fmt(groupTotal)}</span>
              </button>
              {groupTotal > 0 && (
                <div className="px-4 py-2.5 bg-white border-b border-green-50">
                  <div className="flex justify-between text-xs text-gray-500 mb-1.5">
                    <span>Spent: <strong className={spent>0?"text-amber-600":"text-gray-400"}>{fmt(spent)}</strong></span>
                    <span>Remaining: <strong className={spent>0?"text-green-700":"text-gray-400"}>{fmt(Math.max(0,groupTotal-spent))}</strong></span>
                  </div>
                  <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-2 rounded-full transition-all duration-500 ${pct>=90?"bg-red-500":pct>=50?"bg-amber-400":"bg-green-500"}`} style={{width:`${pct}%`}}/>
                  </div>
                  {spent>0&&<div className="text-xs text-gray-400 mt-1 text-right">{Math.round(pct)}% of budget used</div>}
                </div>
              )}
              {isOpen&&items.map((item,i)=>{
                const amt = Number(item.actual)||Number(item.estimated)||0;
                const isCredit = amt < 0;
                return (
                  <div key={item.id} className={`px-4 py-2.5 flex justify-between items-center ${i%2===0?"bg-green-50":"bg-white"}`}>
                    <div>
                      <div className="text-sm text-gray-800">{item.description}</div>
                      {item.notes&&<div className="text-xs text-blue-600 italic">{item.notes}</div>}
                    </div>
                    <span className={`text-sm font-semibold ${isCredit?"text-green-600":"text-gray-900"}`}>{isCredit?`-${fmt(Math.abs(amt))}`:fmt(amt)}</span>
                  </div>
                );
              })}
            </div>
          );
        })}
        {totalBudget>0&&(
          <div className="bg-green-800 text-white rounded-2xl px-4 py-3">
            <div className="flex justify-between items-center">
              <span className="font-bold">Total Budget</span>
              <span className="font-bold text-xl">{fmt(totalBudget)}</span>
            </div>
            {txList.filter(tx=>tx.amount_out>0).length>0&&(
              <div className="flex justify-between items-center mt-1 text-green-300 text-sm">
                <span>Total Spent</span>
                <span>{fmt(txList.reduce((s,tx)=>s+(tx.amount_out||0),0))}</span>
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  const [payingPlayer, setPayingPlayer] = useState(null);
  const [payAmount, setPayAmount] = useState("");
  const [payMethod, setPayMethod] = useState("Venmo");

  const RosterTab = () => (
    <div className="space-y-2.5">
      <div className="flex justify-between items-center px-1 mb-1">
        <span className="text-xs font-semibold text-green-800 uppercase tracking-wide">{roster.length} Players</span>
        {mode==="manager"&&<span className="text-xs text-gray-400">Tap player to log payment</span>}
      </div>
      {[...roster].sort((a,b)=>({Unpaid:0,Partial:1,Paid:2}[a.status]??0)-({Unpaid:0,Partial:1,Paid:2}[b.status]??0)).map(p=>{
        const balance=(Number(p.amount_owed)||0)-(Number(p.amount_paid)||0);
        return (
          <div key={p.id} className="bg-white border border-green-100 rounded-2xl px-4 py-3">
            <div className="flex justify-between items-start mb-2">
              <div><div className="font-semibold text-gray-900">{p.player_name}</div><div className="text-xs text-gray-500">{p.parent_name}</div></div>
              <Badge status={p.status}/>
            </div>
            <div className="grid grid-cols-3 text-xs text-center">
              <div className="bg-gray-50 rounded-lg py-1.5"><div className="text-gray-400">Owed</div><div className="font-bold text-gray-800">{fmt(p.amount_owed)}</div></div>
              <div className="bg-green-50 rounded-lg py-1.5 mx-1"><div className="text-green-600">Paid</div><div className="font-bold text-green-700">{fmt(p.amount_paid)}</div></div>
              <div className={`rounded-lg py-1.5 ${balance>0?"bg-red-50":"bg-green-50"}`}><div className={balance>0?"text-red-500":"text-green-600"}>Due</div><div className={`font-bold ${balance>0?"text-red-600":"text-green-700"}`}>{fmt(balance)}</div></div>
            </div>
            {mode==="manager"&&(
              <div className="flex gap-2 mt-2.5">
                {p.phone&&<><a href={`tel:${p.phone}`} className="flex-1 flex items-center justify-center gap-1 text-xs py-1.5 bg-green-50 text-green-700 rounded-xl font-semibold border border-green-100">📞 Call</a>
                <a href={`sms:${p.phone}`} className="flex-1 flex items-center justify-center gap-1 text-xs py-1.5 bg-blue-50 text-blue-700 rounded-xl font-semibold border border-blue-100">💬 Text</a></>}
                <button onClick={()=>{setPayingPlayer(p);setPayAmount(String(Math.max(0,(p.amount_owed||0)-(p.amount_paid||0))));}} className="flex-1 flex items-center justify-center gap-1 text-xs py-1.5 bg-amber-50 text-amber-700 rounded-xl font-semibold border border-amber-100">💵 Log Pay</button>
              </div>
            )}
          </div>
        );
      })}

      {/* Log payment modal */}
      {payingPlayer&&(
        <div className="fixed inset-0 bg-black/50 flex items-end justify-center z-50" onClick={()=>setPayingPlayer(null)}>
          <div className="bg-white rounded-t-3xl w-full max-w-lg p-6 space-y-4" onClick={e=>e.stopPropagation()}>
            <div className="text-center">
              <div className="font-bold text-lg">{payingPlayer.player_name}</div>
              <div className="text-sm text-gray-500">Log incoming payment</div>
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Amount ($)</label>
              <input type="number" value={payAmount} onChange={e=>setPayAmount(e.target.value)}
                className="w-full mt-1 border border-gray-200 rounded-xl px-4 py-3 text-lg font-bold focus:outline-none focus:ring-2 focus:ring-green-400"/>
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-600 uppercase tracking-wide">Method</label>
              <div className="grid grid-cols-3 gap-2 mt-1">
                {["Venmo","PayPal","Zelle"].map(m=>(
                  <button key={m} onClick={()=>setPayMethod(m)}
                    className={`py-2 rounded-xl text-sm font-semibold border ${payMethod===m?"bg-green-800 text-white border-green-800":"bg-white text-gray-600 border-gray-200"}`}>{m}</button>
                ))}
              </div>
            </div>
            <button onClick={async()=>{
              const amt=Number(payAmount);
              if(!amt||amt<=0){alert("Enter a valid amount");return;}
              await logPayment(payingPlayer.id,payingPlayer.player_name,payingPlayer.parent_name,amt,payMethod);
              setPayingPlayer(null);
            }} disabled={saving} className="w-full py-3.5 bg-green-800 text-white rounded-2xl font-bold text-lg disabled:opacity-50">
              {saving?"Saving…":"✓ Log Payment"}
            </button>
            <button onClick={()=>setPayingPlayer(null)} className="w-full py-2 text-gray-400 text-sm">Cancel</button>
          </div>
        </div>
      )}
    </div>
  );

  const PayTab = () => (
    <div className="space-y-4">
      <div className="bg-green-800 text-white rounded-2xl p-4 text-center">
        <div className="text-green-300 text-xs font-semibold uppercase tracking-wide mb-1">Send Payment To</div>
        <div className="text-xl font-bold">Justin Nymark</div>
        <div className="text-green-300 text-sm">Team Manager · Florida Celtic SC</div>
      </div>
      <a href={PAYMENT.venmo.url} target="_blank" rel="noreferrer"
        className="flex items-center gap-4 bg-white border border-green-100 rounded-2xl px-4 py-4">
        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white font-black text-xl shrink-0" style={{backgroundColor:"#008CFF"}}>V</div>
        <div className="flex-1"><div className="font-bold text-gray-900">Venmo</div><div className="text-sm text-gray-500">{PAYMENT.venmo.handle}</div></div>
        <div className="text-green-700 font-semibold text-sm">Pay →</div>
      </a>
      <a href={PAYMENT.paypal.url} target="_blank" rel="noreferrer"
        className="flex items-center gap-4 bg-white border border-green-100 rounded-2xl px-4 py-4">
        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white font-black text-xl shrink-0" style={{backgroundColor:"#003087"}}>P</div>
        <div className="flex-1"><div className="font-bold text-gray-900">PayPal</div><div className="text-sm text-gray-500">{PAYMENT.paypal.email}</div></div>
        <div className="text-green-700 font-semibold text-sm">Pay →</div>
      </a>
      <div className="flex items-center gap-4 bg-white border border-green-100 rounded-2xl px-4 py-4">
        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white font-black text-xl shrink-0" style={{backgroundColor:"#6D1ED4"}}>Z</div>
        <div className="flex-1"><div className="font-bold text-gray-900">Zelle</div><div className="text-sm text-gray-500">{PAYMENT.zelle.phone}</div></div>
        <a href={`tel:${PAYMENT.zelle.phone}`} className="text-green-700 font-semibold text-sm">Tap to dial</a>
      </div>
      <div className="bg-amber-50 border border-amber-100 rounded-2xl p-4">
        <div className="font-semibold text-amber-800 mb-1 text-sm">📝 Please include in your payment note:</div>
        <p className="text-xs text-amber-700 leading-relaxed">Your player's name and team. Example: <em className="font-semibold">"Brady Smith — U17"</em></p>
      </div>
    </div>
  );

  const ContactCard = ({person,accent}) => (
    <div className={`rounded-2xl p-4 ${accent?"bg-green-800 text-white":"bg-white border border-green-100"}`}>
      <div className={`text-xs font-bold uppercase tracking-wide mb-1 ${accent?"text-green-300":"text-green-700"}`}>{person.title}</div>
      <div className={`font-bold text-lg ${accent?"text-white":"text-gray-900"}`}>{person.name}</div>
      <div className="mt-3 space-y-1.5">
        <a href={`tel:${person.phone}`} className={`flex items-center gap-2 text-sm ${accent?"text-green-200":"text-green-700"}`}>📞 {person.phone}</a>
        <a href={`mailto:${person.email}`} className={`flex items-center gap-2 text-sm ${accent?"text-green-200":"text-green-700"}`}>✉️ {person.email}</a>
      </div>
    </div>
  );

  const ContactsTab = () => (
    <div className="space-y-3">
      <div className="text-xs font-semibold text-green-800 uppercase tracking-wide px-1">Team Management</div>
      <ContactCard person={MANAGER} accent/>
      <div className="text-xs font-semibold text-green-800 uppercase tracking-wide px-1 pt-1">{team.name} — Coach</div>
      <ContactCard person={COACHES[activeTeam]}/>
      <div className="bg-green-50 border border-green-100 rounded-2xl p-4 space-y-2">
        <div className="font-semibold text-green-800 text-sm">Quick Actions</div>
        <a href={`sms:${MANAGER.phone}`} className="flex items-center gap-2 text-sm text-green-700">📱 Text Justin</a>
        <a href={`sms:${COACHES[activeTeam].phone}`} className="flex items-center gap-2 text-sm text-green-700">📱 Text Coach {COACHES[activeTeam].name.split(" ")[0]}</a>
        <a href={`tel:${MANAGER.phone}`} className="flex items-center gap-2 text-sm text-green-700">📞 Call Justin</a>
        <a href={`tel:${COACHES[activeTeam].phone}`} className="flex items-center gap-2 text-sm text-green-700">📞 Call Coach {COACHES[activeTeam].name.split(" ")[0]}</a>
      </div>
    </div>
  );

  const TABS = [
    {id:"dashboard", label:"Summary",  icon:"📊"},
    {id:"budget",    label:"Budget",   icon:"💰"},
    {id:"roster",    label:"Roster",   icon:"👥"},
    {id:"pay",       label:"Pay",      icon:"💳"},
    {id:"contacts",  label:"Contacts", icon:"📋"},
  ];

  if (!loaded) return (
    <div className="flex items-center justify-center min-h-screen bg-green-50">
      <div className="text-center text-green-800">
        <div className="text-6xl mb-4" style={{animation:"bounce 1s infinite"}}>⚽</div>
        <div className="font-semibold text-lg">Loading Florida Celtic SC…</div>
      </div>
    </div>
  );

  if (loadErr) return (
    <div className="flex items-center justify-center min-h-screen bg-green-50">
      <div className="text-center text-gray-600 px-8">
        <div className="text-5xl mb-4">⚽</div>
        <div className="font-bold text-lg mb-2">Florida Celtic SC</div>
        <div className="text-sm text-red-500">Unable to load data. Please check your connection and refresh.</div>
        <button onClick={()=>{setLoaded(false);loadData();}} className="mt-4 px-6 py-2 bg-green-800 text-white rounded-xl text-sm font-semibold">Retry</button>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-green-50 max-w-lg mx-auto">
      {/* PIN Modal */}
      {showPin&&(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-8">
          <div className="bg-white rounded-3xl p-6 w-full max-w-sm space-y-4">
            <div className="text-center"><div className="text-3xl mb-2">🔐</div><div className="font-bold text-lg">Manager Access</div></div>
            <input type="tel" inputMode="numeric" value={pinInput} onChange={e=>setPinInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&tryManagerLogin()}
              placeholder="••••" maxLength={4}
              className={`w-full border-2 ${pinError?"border-red-400":"border-gray-200"} rounded-xl px-4 py-3 text-center text-2xl tracking-widest focus:outline-none focus:border-green-500`}/>
            {pinError&&<p className="text-red-500 text-xs text-center">Incorrect PIN</p>}
            <button onClick={tryManagerLogin} className="w-full py-3 bg-green-800 text-white rounded-xl font-bold">Unlock</button>
            <button onClick={()=>{setShowPin(false);setPinInput("");setPinError(false);}} className="w-full py-2 text-gray-400 text-sm">Cancel</button>
          </div>
        </div>
      )}

      <div className="bg-green-800 px-4 pt-6 pb-3">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2.5">
            <span className="text-3xl" onClick={()=>mode==="manager"?setMode("parent"):setShowPin(true)}>⚽</span>
            <div>
              <div className="text-white font-bold text-lg leading-tight">Florida Celtic SC</div>
              <div className="text-green-300 text-xs">{team.season||"2026–2027"} · Boys U17 ECNL RL</div>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {mode==="manager"&&(
              <button onClick={()=>setMode("parent")} className="text-xs px-3 py-1.5 rounded-full font-bold bg-yellow-400 text-yellow-900">👔 Manager</button>
            )}
            <button onClick={loadData} className="text-green-300 text-xl">↻</button>
          </div>
        </div>
      </div>



      <div className="flex bg-white border-b border-green-100 sticky top-0 z-10">
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex-1 py-2.5 text-xs font-semibold flex flex-col items-center gap-0.5 ${tab===t.id?"text-green-800 border-b-2 border-green-800":"text-gray-400"}`}>
            <span>{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
      </div>

      <div className="px-4 py-4 pb-24">
        {tab==="dashboard" &&<DashboardTab/>}
        {tab==="budget"    &&<BudgetTab/>}
        {tab==="roster"    &&<RosterTab/>}
        {tab==="pay"       &&<PayTab/>}
        {tab==="contacts"  &&<ContactsTab/>}
      </div>

      <div className="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-white border-t border-green-100 px-4 py-2">
        <p className="text-xs text-center text-gray-400">Florida Celtic SC · Live data</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
logDebug('✓ ReactDOM.render() called successfully — app should be visible now');
} catch(e) {
  logDebug('❌ RUNTIME ERROR: ' + e.message);
  logDebug('STACK: ' + (e.stack||'').slice(0,500));
}
</script>
</body>
</html>
